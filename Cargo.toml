[package]
name = "shlesha"
version = "0.1.0"
edition = "2021"
authors = ["Shlesha Contributors"]
description = "High-performance lossless transliteration library with 100% information preservation guarantee"
license = "MIT OR Apache-2.0"
repository = "https://github.com/udapaana/shlesha"
keywords = ["transliteration", "indic", "sanskrit", "devanagari", "lossless"]
categories = ["text-processing", "localization", "algorithms"]

[dependencies]
# Core dependencies for lossless architecture
thiserror = "2.0"
clap = { version = "4.5.40", features = ["derive"] }

# Optional dependencies for bindings
pyo3 = { version = "0.20", features = ["extension-module"], optional = true }
wasm-bindgen = { version = "0.2", optional = true }
tracing = { version = "0.1", optional = true }

[dev-dependencies]
criterion = "0.5"
proptest = "1.6"
vidyut-lipi = "0.2.0"

[features]
default = []
compare-vidyut = []
python = ["pyo3"]
wasm = ["wasm-bindgen"]
profiling = ["tracing"]
ffi = []

[[bench]]
name = "core_benchmarks"
harness = false

[[bench]]
name = "transliteration_bench"
harness = false

[[bench]]
name = "compare_vidyut"
harness = false

[[bench]]
name = "lossless_vs_vidyut"
harness = false

[[bench]]
name = "vidyut_fair_comparison"
harness = false


[profile.release]
lto = true
codegen-units = 1
opt-level = 3

[profile.bench]
inherits = "release"
