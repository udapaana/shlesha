[package]
name = "shlesha"
version = "0.1.0"
edition = "2021"
authors = ["Shlesha Contributors"]
description = "A bidirectional, extensible, and highly-performant transliterator for Indic languages"
license = "MIT OR Apache-2.0"
repository = "https://github.com/udapaana/shlesha"
keywords = ["transliteration", "indic", "sanskrit", "devanagari", "romanization"]
categories = ["text-processing", "localization"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
thiserror = "2.0"
once_cell = "1.21"
regex = "1.11"
indexmap = "2.7"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5.40", features = ["derive"] }

[dev-dependencies]
criterion = "0.5"
proptest = "1.6"
vidyut-lipi = "0.2.0"

[features]
compare-vidyut = []

[[bench]]
name = "transliteration_bench"
harness = false

[[bench]]
name = "compare_vidyut"
harness = false


[profile.release]
lto = true
codegen-units = 1
opt-level = 3

[profile.bench]
inherits = "release"
