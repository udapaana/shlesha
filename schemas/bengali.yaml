    "ভ":
      canonical: "bha"
      varga: "pa-varga"
      voiced: true
      aspirated: true
    "ম":
      canonical: "ma"
      varga: "pa-varga"
      voiced: true
      aspirated: false
      
    # Semi-vowels
    "য":
      canonical: "ya"
      voiced: true
    "র":
