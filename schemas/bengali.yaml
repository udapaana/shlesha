    "স":
      canonical: "sa"
      voiced: false
      
    # Aspirate
    "হ":
      canonical: "ha"
      voiced: true
      
    # Additional Bengali consonants
    "ড়":
      canonical: "ṛa"
      voiced: true
    "ঢ়":
      canonical: "ṛha"
      voiced: true
    "য়":
      canonical: "ẏa"
