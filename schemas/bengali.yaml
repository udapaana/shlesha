name: "Bengali"
type: abugida

metadata:
  version: "1.0.0"
  author: "Shlesha Contributors"
  description: "Bengali script mapping for Bengali and Assamese languages"
  references:
    - "Unicode Standard 15.0"
    - "ISO 15919:2001"

element_types:
  consonant:
    description: "Basic consonant with inherent 'a' vowel"
    properties:
      has_inherent_vowel:
        type: bool
        default: true
        description: "Whether the consonant has inherent 'a' vowel"
      varga:
        type: string
        description: "Consonant class (ka-varga, ca-varga, etc.)"
        required: false
      voiced:
        type: bool
        default: false
        description: "Whether the consonant is voiced"
      aspirated:
        type: bool
        default: false
        description: "Whether the consonant is aspirated"
      
  vowel_independent:
    description: "Independent vowel sign"
    properties:
      is_long:
        type: bool
        default: false
        description: "Whether the vowel is long"
        
  vowel_dependent:
    description: "Dependent vowel sign (matra)"
    properties:
      is_long:
        type: bool
        default: false
        description: "Whether the vowel is long"

mappings:
  consonants:
    # Velars (ka-varga)
    "ক":
      canonical: "ka"
      varga: "ka-varga"
      voiced: false
      aspirated: false
    "খ":
      canonical: "kha"
      varga: "ka-varga"
      voiced: false
      aspirated: true
    "গ":
      canonical: "ga"
      varga: "ka-varga"
      voiced: true
      aspirated: false
    "ঘ":
      canonical: "gha"
      varga: "ka-varga"
      voiced: true
      aspirated: true
    "ঙ":
      canonical: "ṅa"
      varga: "ka-varga"
      voiced: true
      aspirated: false
      
    # Palatals (ca-varga)
    "চ":
      canonical: "ca"
      varga: "ca-varga"
      voiced: false
      aspirated: false
    "ছ":
      canonical: "cha"
      varga: "ca-varga"
      voiced: false
      aspirated: true
    "জ":
      canonical: "ja"
      varga: "ca-varga"
      voiced: true
      aspirated: false
    "ঝ":
      canonical: "jha"
      varga: "ca-varga"
      voiced: true
      aspirated: true
    "ঞ":
      canonical: "ña"
      varga: "ca-varga"
      voiced: true
      aspirated: false
      
    # Retroflexes (ṭa-varga)
    "ট":
      canonical: "ṭa"
      varga: "ṭa-varga"
      voiced: false
      aspirated: false
    "ঠ":
      canonical: "ṭha"
      varga: "ṭa-varga"
      voiced: false
      aspirated: true
    "ড":
      canonical: "ḍa"
      varga: "ṭa-varga"
      voiced: true
      aspirated: false
    "ঢ":
      canonical: "ḍha"
      varga: "ṭa-varga"
      voiced: true
      aspirated: true
    "ণ":
      canonical: "ṇa"
      varga: "ṭa-varga"
      voiced: true
