      is_long: true

  modifiers:
    "्":
      canonical: ""
      type: virama
    "़":
      canonical: ""
      type: nukta
    "ं":
      canonical: "ṃ"
      type: anusvara
    "ः":
      canonical: "ḥ"
      type: visarga
    "ँ":
      canonical: "m̐"
      type: candrabindu
    "ऽ":
      canonical: "'"
      type: avagraha
    "॑":
      canonical: ""
      type: accent
      accent_type: "udatta"
    "॒":
      canonical: ""
      type: accent
      accent_type: "anudatta"

  numerals:
    "०": { canonical: "0" }
    "१": { canonical: "1" }
    "२": { canonical: "2" }
    "३": { canonical: "3" }
    "४": { canonical: "4" }
    "५": { canonical: "5" }
    "६": { canonical: "6" }
    "७": { canonical: "7" }
    "८": { canonical: "8" }
    "९": { canonical: "9" }

  punctuation:
    "।": { canonical: "." }
    "॥": { canonical: ".." }