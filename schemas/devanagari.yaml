      type: vowel_independent
      is_long: true
    "उ":
      canonical: "u"
      type: vowel_independent
      is_long: false
    "ऊ":
      canonical: "ū"
      type: vowel_independent
      is_long: true
    "ऋ":
      canonical: "ṛ"
      type: vowel_independent
      is_long: false
    "ॠ":
      canonical: "ṝ"
      type: vowel_independent
      is_long: true
    "ऌ":
      canonical: "ḷ"
      type: vowel_independent
      is_long: false
    "ॡ":
      canonical: "ḹ"
      type: vowel_independent
      is_long: true
    "ए":
      canonical: "e"
      type: vowel_independent
      is_long: true
    "ऐ":
      canonical: "ai"
      type: vowel_independent
      is_long: true
    "ओ":
      canonical: "o"
      type: vowel_independent
      is_long: true
    "औ":
      canonical: "au"
      type: vowel_independent
      is_long: true
      
    # Dependent vowels (matras)
    "ा":
      canonical: "ā"
      type: vowel_dependent
      is_long: true
    "ि":
      canonical: "i"
      type: vowel_dependent
      is_long: false
    "ी":
      canonical: "ī"
      type: vowel_dependent
      is_long: true
    "ु":
      canonical: "u"
      type: vowel_dependent
      is_long: false
    "ू":
      canonical: "ū"
      type: vowel_dependent
      is_long: true
    "ृ":
      canonical: "ṛ"
      type: vowel_dependent
      is_long: false
    "ॄ":
      canonical: "ṝ"
      type: vowel_dependent
      is_long: true
    "ॢ":
      canonical: "ḷ"
      type: vowel_dependent
      is_long: false
    "ॣ":
      canonical: "ḹ"
