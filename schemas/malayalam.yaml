    "ൣ":
      canonical: "ḹ"
      type: vowel_dependent
      is_long: true
    "െ":
      canonical: "e"
      type: vowel_dependent
      is_long: false
    "േ":
      canonical: "ē"
      type: vowel_dependent
      is_long: true
    "ൈ":
      canonical: "ai"
      type: vowel_dependent
      is_long: true
    "ൊ":
      canonical: "o"
      type: vowel_dependent
      is_long: false
    "ോ":
      canonical: "ō"
      type: vowel_dependent
      is_long: true
    "ൌ":
      canonical: "au"
      type: vowel_dependent
      is_long: true

  modifiers:
    "്":
      canonical: ""
      type: virama
    "ഁ":
      canonical: "m̐"
      type: candrabindu
    "ം":
      canonical: "ṃ"
      type: anusvara
    "ഃ":
      canonical: "ḥ"
      type: visarga

  numerals:
    "൦": { canonical: "0" }
    "൧": { canonical: "1" }
    "൨": { canonical: "2" }
    "൩": { canonical: "3" }
    "൪": { canonical: "4" }
    "൫": { canonical: "5" }
    "൬": { canonical: "6" }
    "൭": { canonical: "7" }
    "൮": { canonical: "8" }
    "൯": { canonical: "9" }

  punctuation:
    "।": { canonical: "." }
    "॥": { canonical: ".." }