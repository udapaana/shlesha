name: "Malayalam"
type: abugida

metadata:
  version: "1.0.0"
  author: "Shlesha Contributors"
  description: "Malayalam script mapping for Malayalam language"
  references:
    - "Unicode Standard 15.0"
    - "Malayalam Language Standards"

element_types:
  consonant:
    description: "Basic consonant with inherent 'a' vowel"
    properties:
      has_inherent_vowel:
        type: bool
        default: true
        description: "Whether the consonant has inherent 'a' vowel"
      varga:
        type: string
        description: "Consonant class"
        required: false
      voiced:
        type: bool
        default: false
        description: "Whether the consonant is voiced"
      aspirated:
        type: bool
        default: false
        description: "Whether the consonant is aspirated"
        
  vowel_independent:
    description: "Independent vowel sign"
    properties:
      is_long:
        type: bool
        default: false
        description: "Whether the vowel is long"
        
  vowel_dependent:
    description: "Dependent vowel sign (matra)"
    properties:
      is_long:
        type: bool
        default: false
        description: "Whether the vowel is long"

mappings:
  consonants:
    # Velars (ka-varga)
    "ക":
      canonical: "ka"
      varga: "ka-varga"
      voiced: false
      aspirated: false
    "ഖ":
      canonical: "kha"
      varga: "ka-varga"
      voiced: false
      aspirated: true
    "ഗ":
      canonical: "ga"
      varga: "ka-varga"
      voiced: true
      aspirated: false
    "ഘ":
      canonical: "gha"
      varga: "ka-varga"
      voiced: true
      aspirated: true
    "ങ":
      canonical: "ṅa"
      varga: "ka-varga"
      voiced: true
      aspirated: false
      
    # Palatals (ca-varga)
    "ച":
      canonical: "ca"
      varga: "ca-varga"
      voiced: false
      aspirated: false
    "ഛ":
      canonical: "cha"
      varga: "ca-varga"
      voiced: false
      aspirated: true
    "ജ":
      canonical: "ja"
      varga: "ca-varga"
      voiced: true
      aspirated: false
    "ഝ":
      canonical: "jha"
      varga: "ca-varga"
      voiced: true
      aspirated: true
    "ഞ":
      canonical: "ña"
      varga: "ca-varga"
      voiced: true
      aspirated: false
      
    # Retroflexes (ṭa-varga)
    "ട":
      canonical: "ṭa"
      varga: "ṭa-varga"
      voiced: false
      aspirated: false
    "ഠ":
      canonical: "ṭha"
      varga: "ṭa-varga"
      voiced: false
      aspirated: true
    "ഡ":
      canonical: "ḍa"
      varga: "ṭa-varga"
      voiced: true
      aspirated: false
    "ഢ":
      canonical: "ḍha"
      varga: "ṭa-varga"
      voiced: true
      aspirated: true
    "ണ":
      canonical: "ṇa"
      varga: "ṭa-varga"
      voiced: true
      aspirated: false
      
    # Dentals (ta-varga)
    "ത":
      canonical: "ta"
      varga: "ta-varga"
      voiced: false
      aspirated: false
    "ഥ":
      canonical: "tha"
      varga: "ta-varga"
      voiced: false
      aspirated: true
    "ദ":
      canonical: "da"
      varga: "ta-varga"
      voiced: true
      aspirated: false
    "ധ":
      canonical: "dha"
      varga: "ta-varga"
      voiced: true
      aspirated: true
    "ന":
      canonical: "na"
      varga: "ta-varga"
      voiced: true
      aspirated: false
      
    # Labials (pa-varga)
    "പ":
      canonical: "pa"
      varga: "pa-varga"
      voiced: false
      aspirated: false
    "ഫ":
      canonical: "pha"
      varga: "pa-varga"
      voiced: false
      aspirated: true
    "ബ":
      canonical: "ba"
      varga: "pa-varga"
      voiced: true
      aspirated: false
    "ഭ":
      canonical: "bha"
      varga: "pa-varga"
      voiced: true
      aspirated: true
    "മ":
      canonical: "ma"
      varga: "pa-varga"
      voiced: true
      aspirated: false
      
    # Semi-vowels
    "യ":
      canonical: "ya"
      voiced: true
    "ര":
      canonical: "ra"
      voiced: true
    "ല":
      canonical: "la"
      voiced: true
    "വ":
      canonical: "va"
      voiced: true
    "ഴ":
      canonical: "ḻa"
      voiced: true
    "ള":
      canonical: "ḷa"
      voiced: true
      
    # Sibilants
    "ശ":
      canonical: "śa"
      voiced: false
    "ഷ":
      canonical: "ṣa"
      voiced: false
    "സ":
      canonical: "sa"
      voiced: false
      
    # Aspirate
    "ഹ":
      canonical: "ha"
      voiced: true
      
    # Additional Malayalam consonants
    "ക്ഷ":
      canonical: "kṣa"
      voiced: false
    "ജ്ഞ":
      canonical: "jña"
      voiced: true

  vowels:
