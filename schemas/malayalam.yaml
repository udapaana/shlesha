    "ഉ":
      canonical: "u"
      type: vowel_independent
      is_long: false
    "ഊ":
      canonical: "ū"
      type: vowel_independent
      is_long: true
    "ഋ":
      canonical: "ṛ"
      type: vowel_independent
      is_long: false
    "ൠ":
      canonical: "ṝ"
      type: vowel_independent
      is_long: true
    "ഌ":
      canonical: "ḷ"
      type: vowel_independent
      is_long: false
    "ൡ":
      canonical: "ḹ"
      type: vowel_independent
      is_long: true
    "എ":
      canonical: "e"
      type: vowel_independent
      is_long: false
    "ഏ":
      canonical: "ē"
      type: vowel_independent
      is_long: true
    "ഐ":
      canonical: "ai"
      type: vowel_independent
      is_long: true
    "ഒ":
      canonical: "o"
      type: vowel_independent
      is_long: false
    "ഓ":
