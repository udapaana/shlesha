name: "Odia"
type: abugida

metadata:
  version: "1.0.0"
  author: "Shlesha Contributors"
  description: "Odia (Oriya) script mapping for Odia language"
  references:
    - "Unicode Standard 15.0"
    - "Odia Language Standards"

element_types:
  consonant:
    description: "Basic consonant with inherent 'a' vowel"
    properties:
      has_inherent_vowel:
        type: bool
        default: true
        description: "Whether the consonant has inherent 'a' vowel"
      varga:
        type: string
        description: "Consonant class"
        required: false
      voiced:
        type: bool
        default: false
        description: "Whether the consonant is voiced"
      aspirated:
        type: bool
        default: false
        description: "Whether the consonant is aspirated"
        
  vowel_independent:
    description: "Independent vowel sign"
    properties:
      is_long:
        type: bool
        default: false
        description: "Whether the vowel is long"
        
  vowel_dependent:
    description: "Dependent vowel sign (matra)"
    properties:
      is_long:
        type: bool
        default: false
        description: "Whether the vowel is long"

mappings:
  consonants:
    # Velars (ka-varga)
    "କ":
      canonical: "ka"
      varga: "ka-varga"
      voiced: false
      aspirated: false
    "ଖ":
      canonical: "kha"
      varga: "ka-varga"
      voiced: false
      aspirated: true
    "ଗ":
      canonical: "ga"
      varga: "ka-varga"
      voiced: true
      aspirated: false
    "ଘ":
      canonical: "gha"
      varga: "ka-varga"
      voiced: true
      aspirated: true
    "ଙ":
      canonical: "ṅa"
      varga: "ka-varga"
      voiced: true
      aspirated: false
      
    # Palatals (ca-varga)
    "ଚ":
