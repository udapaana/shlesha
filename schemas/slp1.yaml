name: "SLP1"
type: alphabet

metadata:
  version: "1.0.0"
  author: "Shlesha Contributors"
  description: "Sanskrit Library Phonetic Basic (SLP1) - single-character ASCII encoding"
  references:
    - "Sanskrit Library Project"
    - "Peter Scharf's SLP1 specification"

element_types:
  consonant:
    description: "Single ASCII consonant"
    properties:
      is_aspirated:
        type: bool
        default: false
        description: "Whether the consonant is aspirated"
      is_retroflex:
        type: bool
        default: false
        description: "Whether the consonant is retroflex"
        
  vowel:
    description: "Single ASCII vowel"
    properties:
      is_long:
        type: bool
        default: false
        description: "Whether the vowel is long"

mappings:
  consonants:
    # Velars
    "k":
      canonical: "k"
      is_aspirated: false
    "K":
      canonical: "kh"
      is_aspirated: true
    "g":
      canonical: "g"
      is_aspirated: false
    "G":
      canonical: "gh"
      is_aspirated: true
    "N":
      canonical: "ṅ"
      is_aspirated: false
      
    # Palatals
    "c":
      canonical: "c"
      is_aspirated: false
    "C":
      canonical: "ch"
      is_aspirated: true
    "j":
      canonical: "j"
      is_aspirated: false
    "J":
      canonical: "jh"
      is_aspirated: true
    "Y":
      canonical: "ñ"
      is_aspirated: false
      
    # Retroflexes
    "w":
      canonical: "ṭ"
      is_aspirated: false
      is_retroflex: true
    "W":
      canonical: "ṭh"
      is_aspirated: true
      is_retroflex: true
    "q":
      canonical: "ḍ"
      is_aspirated: false
      is_retroflex: true
    "Q":
      canonical: "ḍh"
      is_aspirated: true
      is_retroflex: true
    "R":
      canonical: "ṇ"
      is_aspirated: false
      is_retroflex: true
      
    # Dentals
    "t":
      canonical: "t"
      is_aspirated: false
    "T":
      canonical: "th"
      is_aspirated: true
    "d":
      canonical: "d"
      is_aspirated: false
    "D":
      canonical: "dh"
      is_aspirated: true
    "n":
      canonical: "n"
      is_aspirated: false
      
    # Labials
    "p":
      canonical: "p"
      is_aspirated: false
    "P":
      canonical: "ph"
      is_aspirated: true
    "b":
      canonical: "b"
      is_aspirated: false
    "B":
      canonical: "bh"
      is_aspirated: true
    "m":
      canonical: "m"
      is_aspirated: false
      
    # Semi-vowels
    "y":
      canonical: "y"
    "r":
      canonical: "r"
    "l":
      canonical: "l"
    "v":
      canonical: "v"
    "L":
      canonical: "ḷa"
      is_retroflex: true
    "Z":
      canonical: "ḻa"
      
    # Sibilants
    "S":
      canonical: "ś"
    "z":
      canonical: "ṣ"
      is_retroflex: true
    "s":
      canonical: "s"
      
    # Aspirate
    "h":
      canonical: "h"

  vowels:
    "a":
      canonical: "a"
      is_long: false
    "A":
      canonical: "ā"
      is_long: true
    "i":
      canonical: "i"
      is_long: false
    "I":
      canonical: "ī"
      is_long: true
    "u":
      canonical: "u"
      is_long: false
    "U":
      canonical: "ū"
      is_long: true
    "f":
      canonical: "ṛ"
      is_long: false
    "F":
      canonical: "ṝ"
      is_long: true
    "x":
      canonical: "ḷ"
      is_long: false
    "X":
      canonical: "ḹ"
      is_long: true
    "e":
      canonical: "e"
      is_long: true
    "E":
      canonical: "ai"
      is_long: true
    "o":
      canonical: "o"
      is_long: true
    "O":
      canonical: "ō"
      is_long: true
    "V":
      canonical: "au"
      is_long: true

  modifiers:
    "M":
      canonical: "ṃ"
      type: anusvara
    "H":
      canonical: "ḥ"
      type: visarga
    "~":
      canonical: "m̐"
      type: candrabindu
    "'":
      canonical: "'"
      type: avagraha

  numerals:
    "0": { canonical: "0" }
    "1": { canonical: "1" }
    "2": { canonical: "2" }
    "3": { canonical: "3" }
    "4": { canonical: "4" }
    "5": { canonical: "5" }
    "6": { canonical: "6" }
    "7": { canonical: "7" }
    "8": { canonical: "8" }
    "9": { canonical: "9" }

  punctuation:
    ".": { canonical: "." }
    "|": { canonical: ".." }