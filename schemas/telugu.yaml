name: "Telugu"
type: abugida

metadata:
  version: "1.0.0"
  author: "Shlesha Contributors"
  description: "Telugu script mapping for Telugu language"
  references:
    - "Unicode Standard 15.0"
    - "Telugu Language Standards"

element_types:
  consonant:
    description: "Basic consonant with inherent 'a' vowel"
    properties:
      has_inherent_vowel:
        type: bool
        default: true
        description: "Whether the consonant has inherent 'a' vowel"
      varga:
        type: string
        description: "Consonant class"
        required: false
      voiced:
        type: bool
        default: false
        description: "Whether the consonant is voiced"
      aspirated:
        type: bool
        default: false
        description: "Whether the consonant is aspirated"
        
  vowel_independent:
    description: "Independent vowel sign"
    properties:
      is_long:
        type: bool
        default: false
        description: "Whether the vowel is long"
        
  vowel_dependent:
    description: "Dependent vowel sign (matra)"
    properties:
      is_long:
        type: bool
        default: false
        description: "Whether the vowel is long"

mappings:
  consonants:
    # Velars (ka-varga)
    "క":
      canonical: "ka"
      varga: "ka-varga"
      voiced: false
      aspirated: false
    "ఖ":
      canonical: "kha"
      varga: "ka-varga"
      voiced: false
      aspirated: true
    "గ":
      canonical: "ga"
      varga: "ka-varga"
      voiced: true
      aspirated: false
    "ఘ":
      canonical: "gha"
      varga: "ka-varga"
      voiced: true
      aspirated: true
    "ఙ":
      canonical: "ṅa"
      varga: "ka-varga"
      voiced: true
      aspirated: false
      
    # Palatals (ca-varga)
    "చ":
      canonical: "ca"
      varga: "ca-varga"
      voiced: false
      aspirated: false
    "ఛ":
      canonical: "cha"
      varga: "ca-varga"
      voiced: false
      aspirated: true
    "జ":
      canonical: "ja"
      varga: "ca-varga"
      voiced: true
      aspirated: false
    "ఝ":
      canonical: "jha"
      varga: "ca-varga"
      voiced: true
      aspirated: true
    "ఞ":
      canonical: "ña"
      varga: "ca-varga"
      voiced: true
      aspirated: false
      
    # Retroflexes (ṭa-varga)
    "ట":
      canonical: "ṭa"
      varga: "ṭa-varga"
      voiced: false
      aspirated: false
    "ఠ":
      canonical: "ṭha"
      varga: "ṭa-varga"
      voiced: false
      aspirated: true
    "డ":
      canonical: "ḍa"
      varga: "ṭa-varga"
      voiced: true
      aspirated: false
    "ఢ":
      canonical: "ḍha"
      varga: "ṭa-varga"
      voiced: true
      aspirated: true
    "ణ":
      canonical: "ṇa"
      varga: "ṭa-varga"
      voiced: true
      aspirated: false
      
    # Dentals (ta-varga)
    "త":
      canonical: "ta"
      varga: "ta-varga"
      voiced: false
      aspirated: false
    "థ":
      canonical: "tha"
      varga: "ta-varga"
      voiced: false
      aspirated: true
    "ద":
      canonical: "da"
      varga: "ta-varga"
      voiced: true
      aspirated: false
    "ధ":
      canonical: "dha"
      varga: "ta-varga"
      voiced: true
      aspirated: true
    "న":
      canonical: "na"
      varga: "ta-varga"
      voiced: true
      aspirated: false
      
    # Labials (pa-varga)
    "ప":
      canonical: "pa"
      varga: "pa-varga"
      voiced: false
      aspirated: false
    "ఫ":
      canonical: "pha"
      varga: "pa-varga"
      voiced: false
      aspirated: true
    "బ":
      canonical: "ba"
      varga: "pa-varga"
      voiced: true
      aspirated: false
    "భ":
      canonical: "bha"
      varga: "pa-varga"
      voiced: true
      aspirated: true
    "మ":
      canonical: "ma"
      varga: "pa-varga"
      voiced: true
      aspirated: false
      
    # Semi-vowels
    "య":
      canonical: "ya"
      voiced: true
    "ర":
      canonical: "ra"
      voiced: true
    "ల":
      canonical: "la"
      voiced: true
    "వ":
      canonical: "va"
      voiced: true
    "ళ":
      canonical: "ḷa"
      voiced: true
      
    # Sibilants
    "శ":
      canonical: "śa"
      voiced: false
    "ష":
      canonical: "ṣa"
      voiced: false
    "స":
      canonical: "sa"
      voiced: false
      
    # Aspirate
    "హ":
      canonical: "ha"
      voiced: true
      
    # Additional Telugu consonants
    "క్ష":
      canonical: "kṣa"
      voiced: false
    "జ్ఞ":
      canonical: "jña"
      voiced: true

