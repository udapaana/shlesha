SVARITA = "̂"         # U+0302 - Combining circumflex

# Punctuation
DANDA = "|"
DOUBLE_DANDA = "||"
SPACE = " "

# Digits (Arabic numerals in ISO 15919)
DIGIT_0 = "0"
DIGIT_1 = "1"
DIGIT_2 = "2"
