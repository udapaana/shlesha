[metadata]
name = "base-iso15919"
description = "ISO 15919:2001 transliteration standard for Indic scripts"
encoding = "iso15919"
version = "2.0"
standard = "ISO 15919:2001"

[mappings]
# Vowels (ISO 15919 standard)
A = "a"
AA = "ā"
I = "i"
II = "ī"
U = "u"
UU = "ū"
RI = "r̥"
RII = "r̥̄"
LI = "l̥"
LII = "l̥̄"
E = "ē"
AI = "ai"
O = "ō"
AU = "au"

# Consonants (ISO 15919 standard)
KA = "ka"
KHA = "kha"
GA = "ga"
GHA = "gha"
NGA = "ṅa"
CA = "ca"
CHA = "cha"
JA = "ja"
JHA = "jha"
NYA = "ña"
TTA = "ṭa"
TTHA = "ṭha"
DDA = "ḍa"
DDHA = "ḍha"
NNA = "ṇa"
TA = "ta"
THA = "tha"
DA = "da"
DHA = "dha"
NA = "na"
PA = "pa"
PHA = "pha"
BA = "ba"
BHA = "bha"
MA = "ma"
YA = "ya"
RA = "ra"
LA = "la"
VA = "va"
SHA = "śa"
SSA = "ṣa"
SA = "sa"
HA = "ha"

# Combined consonant-vowel forms (need comprehensive mappings)
KAA = "kā"
KI = "ki"
KII = "kī"
KU = "ku"
KUU = "kū"
KRI = "kr̥"
KE = "kē"
KAI = "kai"
KO = "kō"
KAU = "kau"

# Additional consonant forms
GAA = "gā"
GI = "gi"
GII = "gī"
GU = "gu"
GUU = "gū"
GE = "gē"

NAA = "nā"
NI = "ni"
