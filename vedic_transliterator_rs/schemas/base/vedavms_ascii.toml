# === VedaVMS SPECIAL NOTATION ===
# Vedic accent marks
q = "ANUDATTA"      # anudatta (grave accent)
"#" = "UDATTA"      # udatta (acute accent) 
"$" = "SVARITA"     # svarita (circumflex)
"&" = "AVAGRAHA"    # avagraha

# Nasalization patterns
"~M" = "ANUSVARA"   # anusvara
"~g" = "NGA"        # nasal of ka-varga
"~j" = "NYA"        # nasal of cha-varga

# Special combinations
"S~j" = "SHNYA"     # श्ञ as per Shiksha
"(gm)" = "OM"       # ॐ notation

# Modifiers
M = "ANUSVARA"
H = "VISARGA"

# Punctuation
"|" = "DANDA"
"||" = "DOUBLE_DANDA"
" " = "SPACE"
"\n" = "NEWLINE"
"." = "PERIOD"
"," = "COMMA"
"-" = "HYPHEN"
":" = "COLON"
";" = "SEMICOLON"
"(" = "LPAREN"
")" = "RPAREN"
"[" = "LBRACKET"
"]" = "RBRACKET"

# Digits (ASCII)
"0" = "DIGIT_0"
"1" = "DIGIT_1"
"2" = "DIGIT_2"
"3" = "DIGIT_3"
"4" = "DIGIT_4"
"5" = "DIGIT_5"
"6" = "DIGIT_6"
"7" = "DIGIT_7"
"8" = "DIGIT_8"
