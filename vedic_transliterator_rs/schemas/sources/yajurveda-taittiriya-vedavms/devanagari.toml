# === VEDAVMS SPECIFIC NOTATION ===
# Accent marks in ASCII
q = "॒"     # Anudatta (grave)
HASH = "॑"  # Udatta (acute) - using # symbol
DOLLAR = "॓" # Svarita - using $ symbol
AMPERSAND = "ऽ" # Avagraha - using & symbol

# Nasalization patterns
TILDE_M = "ं"    # ~M -> Anusvara
TILDE_g = "ङ्"   # ~g -> ङ्
TILDE_j = "ञ्"   # ~j -> ञ्

# Special conjuncts in VedaVMS notation
S_TILDE_j = "श्ञ"  # S~j -> श्ञ

# Technical notation
LPAREN_gm_RPAREN = "ॐ"  # (gm) -> ॐ

# Modifiers
M = "ं"
H = "ः"
TILDE = "ँ"
HALANT = "्"

# Punctuation
DOT = "।"
DOUBLE_DOT = "॥"
